name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: License and attribution gate
        run: scripts/check-licenses.sh

      - name: Lint and JVM tests
        run: ./gradlew check --stacktrace

      - name: Assemble both release flavors
        run: ./gradlew assembleFossRelease assemblePlayRelease --stacktrace

      - name: Assert foss APK contains no LLM native libs
        run: |
          APK=$(ls app/build/outputs/apk/foss/release/*.apk | head -1)
          echo "Inspecting $APK"
          if unzip -l "$APK" | grep -q liblitertlm; then
            echo "FAIL: foss APK contains liblitertlm — the LLM must not exist in this flavor" >&2
            exit 1
          fi
          echo "OK: no liblitertlm in foss APK"

      - name: APK size gate (foss <= 12MB)
        run: |
          APK=$(ls app/build/outputs/apk/foss/release/*.apk | head -1)
          SIZE=$(stat -c%s "$APK")
          echo "foss release APK: $((SIZE / 1024 / 1024)) MB ($SIZE bytes)"
          if [ "$SIZE" -gt $((12 * 1024 * 1024)) ]; then
            echo "FAIL: foss APK exceeds the 12MB budget (docs/perf-budgets.md)" >&2
            exit 1
          fi

      - name: Upload foss APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pictospeak-foss-release-unsigned
          path: app/build/outputs/apk/foss/release/*.apk
          retention-days: 14
