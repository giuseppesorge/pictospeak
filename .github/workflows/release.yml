name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Gates
        run: |
          scripts/check-licenses.sh
          ./gradlew check --stacktrace

      # Signing is not configured yet (docs/handover.md — Release). Until keys exist,
      # releases publish the unsigned foss APK + play AAB as build artifacts.
      - name: Build release artifacts
        run: ./gradlew assembleFossRelease bundlePlayRelease --stacktrace

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            app/build/outputs/apk/foss/release/*.apk
            app/build/outputs/bundle/playRelease/*.aab
          body: |
            Draft release — attach measured device results from docs/benchmarks.md and run
            scripts/perf/release-checklist.sh before publishing.
